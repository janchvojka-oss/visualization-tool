<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expandable Diagram Builder</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="toolbar">
        <h2>Interactive Diagram</h2>
        <div class="spacer"></div>
        
        <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importDiagram(event)">
        <button class="top-btn btn-outline" onclick="document.getElementById('import-file').click()">📂 Import</button>
        <button class="top-btn btn-outline" onclick="exportDiagram()">💾 Export</button>
        
        <div class="toolbar-divider"></div>
        
        <button id="add-btn" class="top-btn btn-primary" onclick="addNode()">+ Add Rectangle</button>
        <button id="add-hub-btn" class="top-btn btn-primary" style="background-color: #198754;" onclick="addHub()">+ Add Hub</button>
        <button id="mode-btn" class="top-btn btn-secondary" onclick="toggleMode()">Switch to Display Mode</button>
    </div>

    <div id="main-content">
        <div id="whiteboard">
            
            <!-- Floating button to exit the focused Hub view -->
            <button id="exit-hub-btn" onclick="exitHub()">← Exit Hub Focus</button>

            <div id="pan-container">
                <svg id="svg-canvas">
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#6c757d" />
                        </marker>
                    </defs>
                </svg>
                <div id="nodes-container"></div>
            </div>
        </div>
        
        <div id="side-panel">
            <!-- Dynamic Side Panel Content -->
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/lines.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
